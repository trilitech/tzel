name: site (landing page + whitepaper)

# Builds the GitHub Pages bundle for https://trilitech.github.io/tzel/:
# the landing page (docs/index.html) plus a freshly-compiled whitepaper
# PDF (xelatex over docs/whitepaper.tex). The bundle is uploaded as a
# Pages artifact and deployed via actions/deploy-pages, so the PDF
# never needs to be committed to git.
#
# Pages source for this repo is set to "GitHub Actions" (build_type =
# workflow). Switching it back to legacy /docs deploy is a one-click /
# one-API-call rollback if something here breaks badly:
#
#   gh api repos/trilitech/tzel/pages -X PUT \
#     -f build_type=legacy \
#     -f source[branch]=main -f source[path]=/docs
#
# The other files in docs/ (markdown READMEs, the .tex source itself,
# tutorials) are not part of the published site — readers reach those
# via the public github.com repo browser. Only index.html and the
# generated whitepaper.pdf are staged into the Pages bundle.

on:
  push:
    branches: [main]
    paths:
      - "docs/index.html"
      - "docs/whitepaper.tex"
      - ".github/workflows/whitepaper.yml"
  pull_request:
    paths:
      - "docs/index.html"
      - "docs/whitepaper.tex"
      - ".github/workflows/whitepaper.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pages-deploy concurrency: don't cancel an in-flight deploy with a
# fresher commit; let the running deploy finish first.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Pinned to commit SHA rather than @v6 so a tag retag cannot
        # silently change what we run. Bump by re-resolving the v6
        # tag against the upstream actions/checkout repo.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install TeX Live (xelatex + latexmk + common packages)
        # Stock Ubuntu apt repos rather than a third-party LaTeX action,
        # so the dependency chain is just GitHub-maintained actions/*
        # plus apt. ~3-5 min install per cold run; transparent
        # provenance.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-recommended \
            texlive-latex-extra \
            latexmk

      - name: Compile whitepaper with xelatex
        # Manual \begin{thebibliography} (no biber/biblatex), so two
        # xelatex passes resolve all citations. latexmk schedules them.
        working-directory: docs
        run: latexmk -xelatex -interaction=nonstopmode -halt-on-error whitepaper.tex

      - name: Stage Pages bundle
        # Two-file bundle: the landing page and the freshly-built PDF.
        # The rest of docs/ stays out of the published site — readers
        # reach those files via the public repo on github.com.
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp docs/whitepaper.pdf _site/whitepaper.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: _site

  deploy:
    # Only deploy on main pushes (and manual dispatches from main).
    # PRs from forks would not have the pages:write permission anyway,
    # but the explicit guard keeps the deploy job from running for
    # PR-build feedback.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
