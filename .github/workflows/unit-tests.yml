name: Unit Tests

on:
  push:
    branches:
      - main
      - wip-xmss-depth16-migration
    paths-ignore:
      - "docs/pq.png"
  pull_request:
    paths-ignore:
      - "docs/pq.png"
  workflow_dispatch:

permissions:
  contents: read

env:
  TZEL_TRAP_FULL_XMSS_REBUILDS: "1"
  CARGO_TERM_COLOR: always

jobs:
  rust-and-cairo:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust nightly for verifier/prover crates
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-07-14

      - name: Set up Scarb
        uses: software-mansion/setup-scarb@v1
        with:
          scarb-version: "2.16.1"

      - name: Run Rust unit tests
        run: |
          cargo test -p tzel-core --lib
          cargo +nightly-2025-07-14 test -p tzel-verifier --lib
          cargo test --lib -p tzel-services
          cargo test --test integration -p tzel-services
          cargo test --test cross_impl_interop -p tzel-services
          cargo test --manifest-path services/tzel/Cargo.toml --bin tzel-operator
          cargo +nightly-2025-07-14 test -p tzel-rollup-kernel --lib
          cargo +nightly-2025-07-14 test -p tzel-rollup-kernel --test bridge_flow
          cargo test -p tzel-rollup-kernel --bin verified_bridge_fixture_message
          cargo +nightly-2025-07-14 test -p tzel-rollup-kernel --no-default-features --lib
          cargo +nightly-2025-07-14 test -p tzel-rollup-kernel --no-default-features --test bridge_flow
          cargo test -p tzel-wallet-app --lib
          cargo test -p tzel-ledger-app --bin sp-ledger
          cargo test -p tzel-demo

      - name: Check deployment script syntax
        run: |
          bash -n scripts/octez_rollup_sandbox_smoke.sh
          bash -n scripts/octez_rollup_sandbox_dal_smoke.sh
          bash -n scripts/prepare_rollup_config_admin.sh
          bash -n scripts/submit_rollup_config.sh
          bash -n scripts/build_rollup_kernel_release.sh
          bash -n scripts/install_tzel_binaries.sh
          bash -n scripts/init_shadownet_operator_box.sh
          bash -n scripts/shadownet_operator_preflight.sh
          bash -n scripts/shadownet_live_e2e_smoke.sh

      - name: Run script unit tests
        run: |
          PYTHONPATH=. python3 -m unittest \
            scripts.tests.test_build_alpha_sandbox_params \
            scripts.tests.test_submit_rollup_config \
            scripts.tests.test_octez_rollup_sandbox_dal_smoke \
            scripts.tests.test_shadownet_operator_paths \
            scripts.tests.test_workflow_references

      - name: Run Cairo unit tests
        working-directory: cairo
        run: scarb test

  ocaml:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install OCaml system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev pkg-config

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2.0"

      - name: Install OCaml dependencies
        run: |
          opam install -y dune alcotest cstruct ctypes ctypes-foreign hex mirage-crypto yojson

      - name: Run OCaml unit tests
        run: ./scripts/ocaml_unit_tests.sh
