[package]
name = "starkprivacy"
version = "0.2.0"
edition = "2025_12"

[[target.executable]]
name = "step_shield"
function = "starkprivacy::step_shield::main"

[[target.executable]]
name = "step_unshield"
function = "starkprivacy::step_unshield::main"

[[target.executable]]
name = "step_join"
function = "starkprivacy::step_join::main"

[[target.executable]]
name = "step_split"
function = "starkprivacy::step_split::main"

[[target.executable]]
name = "step_testvec"
function = "starkprivacy::step_testvec::main"

[[target.executable]]
name = "run_shield"
function = "starkprivacy::run_shield::main"

[[target.executable]]
name = "run_transfer"
function = "starkprivacy::run_transfer::main"

[[target.executable]]
name = "run_unshield"
function = "starkprivacy::run_unshield::main"

[cairo]
enable-gas = false

[features]
depth16 = []
depth32 = []
depth48 = []
default = ["depth48"]

[dependencies]
cairo_execute = "2.16.1"
